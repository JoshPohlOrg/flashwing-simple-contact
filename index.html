<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flashwing Photography</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ffe6f0, #e6f7ff);
      min-height: 100vh;
      padding: 40px 20px;
      color: #333;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 3rem;
      font-weight: 700;
      color: #ff4fa3;
    }

    header p {
      margin-top: 10px;
      color: #666;
    }

    /* SOCIAL */
    .cards {
      display: flex;
      gap: 25px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 60px;
    }

    .card-link {
      text-decoration: none;
      color: inherit;
    }

    .card {
      width: 280px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      transition: 0.3s ease;
      text-align: center;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.4);
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .instagram { color: #e1306c; }
    .facebook { color: #1877f2; }

    .btn-hint {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #777;
    }

    /* SECTION */
    .section-title {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 25px;
      color: #444;
    }

    /* GALLERY */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto 30px auto;
    }

    .photo-card {
      border-radius: 18px;
      overflow: hidden;
      background: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transition: transform 0.2s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .photo-card:hover {
      transform: translateY(-6px);
    }

    .photo-card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
    }

    /* LOAD MORE */
    .load-more-wrap {
      text-align: center;
      margin-bottom: 60px;
    }

    .load-more {
      padding: 12px 22px;
      border: none;
      border-radius: 999px;
      background: #ff4fa3;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .load-more:hover {
      background: #e63e91;
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      color: #777;
      font-size: 0.85rem;
      margin-top: 40px;
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .lightbox img {
      max-width: 95%;
      max-height: 90%;
      object-fit: contain;
      border-radius: 10px;
    }

    .lightbox .close {
      position: absolute;
      top: 20px;
      right: 25px;
      font-size: 2.5rem;
      color: white;
      cursor: pointer;
      user-select: none;
    }

  </style>
</head>

<body>

<header>
  <h1>Flashwing Photography ✨</h1>
  <p>Capturing moments that feel like magic</p>
</header>

<!-- SOCIAL -->
<div class="cards">

  <a class="card-link" href="https://www.instagram.com/flashwing_photography" target="_blank">
    <div class="card">
      <div class="icon instagram">📸</div>
      <h2>Instagram</h2>
      <div class="btn-hint">Click to open Instagram →</div>
    </div>
  </a>

  <a class="card-link" href="https://www.facebook.com/share/1EMMSvB63H/" target="_blank">
    <div class="card">
      <div class="icon facebook">📘</div>
      <h2>Facebook</h2>
      <div class="btn-hint">Click to open Facebook →</div>
    </div>
  </a>

</div>

<!-- GALLERY -->
<h2 class="section-title">Featured Work</h2>

<div class="gallery" id="gallery"></div>

<!-- LOAD MORE -->
<div class="load-more-wrap">
  <button class="load-more" id="loadMoreBtn">Load More Photos</button>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
  <span class="close" id="closeLightbox">&times;</span>
  <img id="lightboxImg" src="" alt="Full view">
</div>

<footer>
  © 2026 Flashwing Photography • Made with ✨ and light
</footer>

<script>
const imageFiles = [
  "65C5E889-98AF-4897-A3DC-3FC6584BD90D.jpg",
  "336A0541.jpeg",
  "336A0572.jpeg",
  "336A0575.jpeg",
  "336A0600.jpeg",
  "336A0610.jpeg",
  "336A0773.jpeg",
  "336A0807.jpeg",
  "336A0877.jpeg",
  "336A0927.jpeg",
  "336A1225.jpeg",
  "336A1304.jpeg",
  "336A1529.jpeg",
  "336A1624.jpeg",
  "336A1625.jpeg",
  "336A1631.jpeg",
  "336A1632.jpeg",
  "336A1794.jpeg",
  "336A1914.jpeg",
  "336A1959.jpeg",
  "336A4337.jpeg",
  "336A4377.jpeg",
  "336A7557.jpeg",
  "336A7647.jpeg",
  "IMG_0213.jpeg"
];

const gallery = document.getElementById("gallery");
const btn = document.getElementById("loadMoreBtn");

const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");
const closeBtn = document.getElementById("closeLightbox");

let visibleCount = 8;

function openLightbox(src) {
  lightboxImg.src = src;
  lightbox.style.display = "flex";
}

function closeLightboxFn() {
  lightbox.style.display = "none";
  lightboxImg.src = "";
}

closeBtn.addEventListener("click", closeLightboxFn);

lightbox.addEventListener("click", (e) => {
  if (e.target === lightbox) closeLightboxFn();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeLightboxFn();
});

function render() {
  gallery.innerHTML = "";

  imageFiles.slice(0, visibleCount).forEach(file => {
    const card = document.createElement("div");
    card.className = "photo-card";

    const img = document.createElement("img");
    img.src = `assets/${file}`;
    img.alt = "Photography";

    img.addEventListener("click", () => {
      openLightbox(img.src);
    });

    card.appendChild(img);
    gallery.appendChild(card);
  });

  if (visibleCount >= imageFiles.length) {
    btn.style.display = "none";
  }
}

btn.addEventListener("click", () => {
  visibleCount += 8;
  render();
});

render();
</script>

</body>
</html>
